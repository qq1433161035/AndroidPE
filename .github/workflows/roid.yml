name: Android CI (Auto Build APK)

# 触发条件：推送到 main 分支或发起 PR 时自动构建
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # 使用 Ubuntu 最新版作为构建环境
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 JDK 17（适配你的 compileSdk 34）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle  # 缓存 Gradle 依赖，加速后续构建

      # 3. 给 gradlew 脚本添加执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 构建 Release 版 APK
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 5. 上传构建好的 APK 作为产物
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AndroidPE-Release-APK
          # 路径与你的项目输出完全对应
          path: app/build/outputs/apk/release/*.apk
